name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # Intel macOS: cross-compiled on the Apple-Silicon runner. The
          # dedicated macos-13 (Intel) runners are scarce and often never get
          # picked up; the arm64 runner builds the x86_64 target reliably.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc (TLS backend) needs nasm on Windows; cmake is preinstalled on all
      # GitHub-hosted runners.
      - name: Install nasm (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Test
        run: cargo test --lib

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          NAME="reheader-desktop-${{ matrix.target }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/reheader-desktop.exe" "dist/$NAME.exe"
          else
            cp "target/${{ matrix.target }}/release/reheader-desktop" "dist/$NAME"
            chmod +x "dist/$NAME"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
